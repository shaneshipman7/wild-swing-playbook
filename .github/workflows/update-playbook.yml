name: Update Wild Swing Playbook

on:
  schedule:
    - cron: '0 14 * * *'     # 9:00 AM CDT
  workflow_dispatch:

permissions:
  contents: write     # ← This is the key fix

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # Ensures proper permissions

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser beautifulsoup4 markdownify pandas yfinance

      - name: Run Playbook Script
        run: python blogreport.py

      - name: Commit and Push Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet HEAD -- Master_Playbook_Database_*.csv Playbook_Watchlist_Import_*.txt; then
            echo "No changes to commit"
          else
            git add Master_Playbook_Database_*.csv Playbook_Watchlist_Import_*.txt
            git commit -m "Daily update: New playbook data + prices"
            git push
          fi
