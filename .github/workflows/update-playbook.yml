name: Update Wild Swing Playbook

on:
  schedule:
    - cron: '0 14 * * *'     # Runs at 9:00 AM CDT (14:00 UTC)
  workflow_dispatch:         # Allows manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser beautifulsoup4 markdownify pandas yfinance

      - name: Run Playbook Script
        run: python blogreport.py

      - name: Commit and Push Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Master_Playbook_Database_*.csv Playbook_Watchlist_Import_*.txt
          git commit -m "Daily update: New playbook data + prices" || echo "No changes to commit"
          git push
