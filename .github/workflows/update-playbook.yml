name: Update Wild Swing Playbook Data

on:
  schedule:
    # Run every 45 minutes during market hours (Mon–Fri)
    - cron: '*/45 13-21 * * 1-5'
  workflow_dispatch:   # Allows manual trigger from GitHub

jobs:
  update-playbook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser beautifulsoup4 pandas lxml

      - name: Generate Playbook CSV
        run: |
          python generate_playbook.py

      - name: Commit and push changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "Auto-update playbook data [skip ci]"
          add: |
            Master_Playbook_Database_*.csv
            Playbook_Watchlist_Import_*.txt
          default_author: github_actions
