name: Update Wild Swing Playbook Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # ← This is the most important part
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false   # Important for push

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run data collector script
      run: python blogreport.py

    - name: Commit and push updates
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add Master_Playbook_Database_*.csv Playbook_Watchlist_Import_*.txt
        git commit -m "🤖 Auto-update playbook data [skip ci]" || echo "No changes to commit"
        git push
