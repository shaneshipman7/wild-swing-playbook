name: Update Wild Swing Playbook Data

on:
  schedule:
    - cron: '*/45 * * * *'     # ← Every 45 minutes (while market is trading)
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        persist-credentials: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run data collector script
      env:
        POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      run: python blogreport.py

    - name: Add & Commit
      uses: EndBug/add-and-commit@v9
      with:
        add: 'Master_Playbook_Database_*.csv Playbook_Watchlist_Import_*.txt'
        message: '🤖 Auto-update playbook data [skip ci]'
        push: true
