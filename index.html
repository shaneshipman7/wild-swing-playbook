<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Swing Trades • Live Playbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
   
    <style>
        .custom-scroll::-webkit-scrollbar { height: 18px; }
        .custom-scroll::-webkit-scrollbar-track { background: #020617; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 9999px; border: 4px solid #020617; }
        .table-wrapper { height: calc(100vh - 240px); overflow: auto; }
        .table-cell { font-size: 1.25rem; line-height: 1.5; font-weight: 600; }
        .header-cell { font-size: 1.05rem; line-height: 1.35; white-space: nowrap; font-weight: 700; }
        .scenario-cell { white-space: normal !important; line-height: 1.45; }
        .missing-price { color: #64748b; font-style: italic; }
        .disclaimer-banner {
            background: linear-gradient(90deg, #f59e0b, #ef4444);
            color: white;
            padding: 16px 24px;
            text-align: center;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">
    <div class="w-full px-4 sm:px-6 lg:px-8 py-6 h-screen flex flex-col">
        <header class="flex-shrink-0 mb-5 border-b border-slate-800 pb-5">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-teal-400 to-emerald-400 flex items-center gap-3">
                        Wild Swing Trades
                    </h1>
                    <p class="text-slate-300 text-xl mt-1 font-bold">Live Playbook • Active Database</p>
                </div>
                <div class="flex items-center gap-4">
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="checkbox" id="showPassed" class="w-4 h-4 accent-emerald-500">
                        <span>Show PASSED trades</span>
                    </label>
                    <div class="px-5 py-2 bg-emerald-900/60 border border-emerald-500 rounded-2xl text-emerald-400 font-bold flex items-center gap-2 text-sm">
                        LIVE
                    </div>
                </div>
            </div>
        </header>

        <!-- DISCLAIMER BANNER -->
        <div class="disclaimer-banner">
            ⚠️ <strong>EXPERIMENTAL DATA ONLY</strong> — Accuracy is <strong>NOT guaranteed</strong>.<br>
            This is <strong>NOT financial advice</strong>. Use at your own risk. For educational and personal use only.
        </div>

        <div class="flex-shrink-0 flex gap-4 mb-4 items-center">
            <div class="relative flex-1 max-w-md">
                <span class="absolute left-4 top-4 text-slate-400">🔎</span>
                <input type="text" id="searchInput" placeholder="Search..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl pl-12 py-3.5 text-base focus:border-teal-400">
            </div>
            <div class="text-sm text-slate-400">Click headers to sort • Scroll horizontally</div>
        </div>
        <div class="flex-1 table-wrapper custom-scroll border border-slate-800 bg-slate-900/70 backdrop-blur-xl rounded-2xl overflow-auto">
            <div class="min-w-[3100px]">
                <div id="tableHeaders" class="flex sticky top-0 bg-slate-900 border-b border-slate-700 z-20"></div>
                <div id="tableBody" class="flex flex-col text-slate-200"></div>
            </div>
        </div>
        <div id="emptyState" class="hidden text-center py-12 text-slate-400">No matches found</div>
    </div>

    <script>

        let sortDirection = {};
        let showPassed = false;
        const hiddenColumns = ['Post_Title', 'Price_Updated'];
        const columnWidths = {
            'Ticker': '115px', 'Play_Status': '165px', 'Scenario': '520px',
            'Entry': '310px', 'Stop_Loss': '270px', 'Targets': '350px',
            'R_R_Ratio': '145px', 'Est_Probability': '155px', 
            'Pct_Return': '160px', 'Link': '125px',
            'Current_Price': '165px', 'Date': '135px'
        };

        function formatHeaderLabel(h) {
            const map = { 
                'R_R_Ratio': 'R:R RATIO', 
                'Est_Probability': 'EST. PROB.',
                'Pct_Return': '% RETURN',
                'Play_Status': 'STATUS' 
            };
            return map[h] || h.replace(/_/g, ' ').toUpperCase();
        }

        // ... (rest of the original JavaScript code remains the same)

    </script>
</body>
</html>
