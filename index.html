<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Swing Trades • Live Playbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
   
    <style>
        .custom-scroll::-webkit-scrollbar { height: 14px; width: 14px; }
        .custom-scroll::-webkit-scrollbar-track { background: #020617; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 9999px; border: 3px solid #020617; }
        .table-wrapper { height: calc(100vh - 240px); overflow: auto; }
        .table-cell { font-size: 0.95rem; line-height: 1.5; font-weight: 500; padding: 12px 16px; flex-shrink: 0; display: flex; align-items: center; }
        .header-cell { font-size: 0.85rem; line-height: 1.35; white-space: nowrap; font-weight: 700; padding: 12px 16px; flex-shrink: 0; cursor: pointer; user-select: none; }
        .header-cell:hover { background-color: #1e293b; }
        .scenario-cell { white-space: normal !important; line-height: 1.45; display: block; }
        .missing-price { color: #64748b; font-style: italic; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">
    <div class="w-full px-4 sm:px-6 lg:px-8 py-6 h-screen flex flex-col">
        
        <header class="flex-shrink-0 mb-5 border-b border-slate-800 pb-5">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-3xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-teal-400 to-emerald-400 flex items-center gap-3">
                        📈 Wild Swing Trades
                    </h1>
                    <p class="text-slate-400 text-lg mt-1 font-semibold">Live Playbook Dashboard</p>
                </div>
                <div class="flex flex-wrap items-center gap-4">
                    <div class="flex items-center gap-3 bg-slate-900 border border-slate-800 px-4 py-2 rounded-xl">
                        <label class="flex items-center gap-2 text-xs font-bold text-slate-300 cursor-pointer">
                            <input type="checkbox" id="showPassed" class="w-4 h-4 accent-emerald-500" checked>
                            <span>SHOW PASSED</span>
                        </label>
                        <label class="flex items-center gap-2 text-xs font-bold text-slate-300 cursor-pointer">
                            <input type="checkbox" id="showStopOut" class="w-4 h-4 accent-red-500" checked>
                            <span>SHOW STOPPED OUT</span>
                        </label>
                    </div>
                    <div id="connectionStatus" class="px-4 py-2 bg-amber-950/60 border border-amber-500 rounded-xl text-amber-400 font-bold flex items-center gap-2 text-xs animate-pulse">
                        ⏳ FETCHING STABLE DATA...
                    </div>
                </div>
            </div>
        </header>

        <div class="flex-shrink-0 flex flex-col sm:flex-row gap-4 mb-4 items-stretch sm:items-center justify-between">
            <div class="relative flex-1 max-w-md">
                <span class="absolute left-4 top-3 text-slate-500">🔍</span>
                <input type="text" id="searchInput" placeholder="Search symbol, strategy, or terms..." class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-11 py-2 text-sm focus:outline-none focus:border-teal-400 text-slate-100">
            </div>
            <div class="text-xs text-slate-400 flex items-center gap-2">
                <span>💡 Click column headers to sort</span>
                <span>•</span>
                <span id="recordCount" class="font-bold text-teal-400">Rows: 0</span>
            </div>
        </div>

        <div class="flex-1 table-wrapper custom-scroll border border-slate-800 bg-slate-900/40 backdrop-blur-xl rounded-xl overflow-auto">
            <div class="min-w-[2400px] flex flex-col h-full">
                <div id="tableHeaders" class="flex sticky top-0 bg-slate-900 border-b border-slate-700 z-20 shadow-md"></div>
                <div id="tableBody" class="flex flex-col text-slate-200 divide-y divide-slate-800 overflow-y-auto flex-1"></div>
            </div>
        </div>
        
        <div id="emptyState" class="hidden text-center py-12 text-slate-400 bg-slate-900/20 border border-dashed border-slate-800 rounded-xl mt-4">
            No active trade matches found matching your filters.
        </div>
    </div>

    <script>
        const stableFileUrl = "https://raw.githubusercontent.com/shaneshipman7/wild-swing-playbook/main/Master_Playbook_Database_2026-05-31.csv";
        
        let rawPlaybookData = [];
        let currentFilteredData = [];
        let sortKey = 'Date';
        let sortAscending = false;

        const columnDefinitions = [
            { key: 'Date', label: 'DATE', width: '110px' },
            { key: 'Ticker', label: 'TICKER', width: '90px' },
            { key: 'Play_Status', label: 'PLAY STATUS', width: '220px' },
            { key: 'Scenario', label: 'STRATEGY SCENARIO', width: '380px' },
            { key: 'Current_Price', label: 'LIVE PRICE', width: '110px' },
            { key: 'Entry', label: 'ENTRY ZONE', width: '280px' },
            { key: 'Stop_Loss', label: 'STOP LOSS', width: '240px' },
            { key: 'Targets', label: 'TARGET OBJECTIVES', width: '320px' },
            { key: 'R_R_Ratio', label: 'R:R RATIO', width: '110px' },
            { key: 'Est_Probability', label: 'EST. PROB.', width: '110px' },
            { key: 'Pct_Return', label: '% RETURN', width: '120px' },
            { key: 'Link', label: 'RESEARCH', width: '100px' }
        ];

        function parseRangeAverage(val) {
            if (!val) return null;
            let clean = String(val).replace(/[\$,]/g, '').trim();
            let numbers = clean.match(/([-+]?[\d\.]+)/g);
            if (!numbers) return null;
            let parsed = numbers.map(Number).filter(n => !isNaN(n));
            if (parsed.length === 0) return null;
            return parsed.reduce((a, b) => a + b, 0) / parsed.length;
        }

        function calculatePctReturn(row, currentPrice) {
            if (!currentPrice || isNaN(currentPrice)) return 0;
            let entryAvg = parseRangeAverage(row.Entry);
            if (!entryAvg) return 0;
            return ((currentPrice - entryAvg) / entryAvg) * 100;
        }

        function evaluatePlayStatus(row, price) {
            if (!price || isNaN(price)) return { text: "⏳ Price N/A", classes: "bg-slate-800 text-slate-400" };
            
            const ticker = String(row.Ticker).toUpperCase().trim();
            const scenario = String(row.Scenario).toUpperCase();
            
            if (ticker === "MFA" && price >= 9.20 && price <= 9.80) return { text: "✅ ACTIONABLE PULLBACK", classes: "bg-emerald-950 text-emerald-400 border border-emerald-500/30" };
            if (ticker === "ELF" && price >= 53 && price <= 58) return { text: "✅ ACTIONABLE PULLBACK", classes: "bg-emerald-950 text-emerald-400 border border-emerald-500/30" };
            if (ticker === "HEI" && price >= 345) return { text: "✅ BREAKOUT TRIGGERED", classes: "bg-blue-950 text-blue-400 border border-blue-500/30" };
            if (ticker === "GE" && price >= 318) return { text: "✅ BREAKOUT TRIGGERED", classes: "bg-blue-950 text-blue-400 border border-blue-500/30" };
            if (ticker === "TE" && price >= 9.80 && price <= 11.5) return { text: "✅ IN RANGE / ACTIONABLE", classes: "bg-teal-950 text-teal-400 border border-teal-500/30" };
            if (ticker === "PIII" && price >= 16.00) return { text: "✅ BREAKOUT TRIGGERED", classes: "bg-blue-950 text-blue-400 border border-blue-500/30" };

            let stopAvg = parseRangeAverage(row.Stop_Loss);
            if (stopAvg && price <= stopAvg) {
                return { text: "❌ STOPPED OUT", classes: "bg-red-950/80 text-red-400 border border-red-900" };
            }

            let entryAvg = parseRangeAverage(row.Entry);
            if (entryAvg) {
                let dev = (price - entryAvg) / entryAvg;
                if (scenario.includes("BREAKOUT") && price >= entryAvg) {
                    return { text: "🚀 BREAKOUT ACTIVE", classes: "bg-blue-950 text-blue-300 border border-blue-700/40" };
                }
                if (Math.abs(dev) <= 0.03) {
                    return { text: "🎯 IN ENTRY ZONE", classes: "bg-emerald-950 text-emerald-300 border border-emerald-600/40" };
                }
                if (price < entryAvg && dev >= -0.08) {
                    return { text: "📉 PULLBACK BUY ZONE", classes: "bg-amber-950 text-amber-300 border border-amber-600/40" };
                }
            }

            return { text: "🏁 PASSED / MONITORING", classes: "bg-slate-900 text-slate-400 border border-slate-800" };
        }

        async function fetchPlaybookCSV() {
            const statusEl = document.getElementById('connectionStatus');
            try {
                let response = await fetch(stableFileUrl);
                if (!response.ok) throw new Error("File could not be requested");
                let loadedText = await response.text();

                Papa.parse(loadedText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        rawPlaybookData = results.data.map(row => {
                            let price = parseFloat(row.Current_Price);
                            if (isNaN(price)) price = null;
                            
                            let calculatedReturn = calculatePctReturn(row, price);
                            let statusInfo = evaluatePlayStatus(row, price);

                            return {
                                ...row,
                                Current_Price: price,
                                Pct_Return: calculatedReturn,
                                _statusText: statusInfo.text,
                                _statusClasses: statusInfo.classes
                            };
                        });

                        statusEl.className = "px-4 py-2 bg-emerald-950 border border-emerald-500 rounded-xl text-emerald-400 font-bold text-xs";
                        statusEl.innerHTML = "● REPO CONNECTED";
                        executeFilterAndRender();
                    }
                });
            } catch (err) {
                statusEl.className = "px-4 py-2 bg-red-950 border border-red-500 rounded-xl text-red-400 font-bold text-xs";
                statusEl.innerHTML = "❌ TARGET FILE NOT FOUND";
            }
        }

        function executeFilterAndRender() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const showPassed = document.getElementById('showPassed').checked;
            const showStopOut = document.getElementById('showStopOut').checked;

            currentFilteredData = rawPlaybookData.filter(row => {
                if (!showPassed && row._statusText.includes("PASSED")) return false;
                if (!showStopOut && row._statusText.includes("STOPPED OUT")) return false;

                if (searchTerm) {
                    return (
                        String(row.Ticker).toLowerCase().includes(searchTerm) ||
                        String(row.Scenario).toLowerCase().includes(searchTerm) ||
                        String(row.Entry).toLowerCase().includes(searchTerm) ||
                        String(row._statusText).toLowerCase().includes(searchTerm)
                    );
                }
                return true;
            });

            currentFilteredData.sort((a, b) => {
                let valA = a[sortKey];
                let valB = b[sortKey];

                if (sortKey === 'Current_Price' || sortKey === 'Pct_Return') {
                    valA = valA !== null ? parseFloat(valA) : -99999;
                    valB = valB !== null ? parseFloat(valB) : -99999;
                    return sortAscending ? valA - valB : valB - valA;
                }

                if (sortKey === 'Play_Status') {
                    valA = String(a._statusText || '').toLowerCase();
                    valB = String(b._statusText || '').toLowerCase();
                    return sortAscending ? valA.localeCompare(valB) : valB.localeCompare(valA);
                }
                
                valA = String(valA || '').toLowerCase();
                valB = String(valB || '').toLowerCase();
                return sortAscending ? valA.localeCompare(valB) : valB.localeCompare(valA);
            });

            document.getElementById('recordCount').innerText = `Rows: ${currentFilteredData.length}`;
            renderTableGrid();
        }

        function renderTableHeaders() {
            const container = document.getElementById('tableHeaders');
            container.innerHTML = '';
            
            columnDefinitions.forEach(col => {
                const headerCell = document.createElement('div');
                headerCell.className = `header-cell text-slate-400 border-r border-slate-800 flex items-center justify-between transition-colors`;
                headerCell.style.width = col.width;
                
                let indicator = '';
                if (col.key === sortKey) {
                    indicator = sortAscending ? ' 🔼' : ' 🔽';
                }
                
                headerCell.innerHTML = `<span>${col.label}</span><span class="text-xs text-slate-600">${indicator}</span>`;
                headerCell.addEventListener('click', () => {
                    if (sortKey === col.key) {
                        sortAscending = !sortAscending;
                    } else {
                        sortKey = col.key;
                        sortAscending = true;
                    }
                    renderTableHeaders();
                    executeFilterAndRender();
                });
                container.appendChild(headerCell);
            });
        }

        function renderTableGrid() {
            const body = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            body.innerHTML = '';

            if (currentFilteredData.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            currentFilteredData.forEach((row, index) => {
                const rowStrip = document.createElement('div');
                rowStrip.className = `flex hover:bg-slate-900/60 transition-colors ${index % 2 === 0 ? 'bg-slate-950' : 'bg-slate-900/20'}`;
                
                columnDefinitions.forEach(col => {
                    const cell = document.createElement('div');
                    cell.className = `table-cell border-r border-slate-900/60 text-sm tracking-wide`;
                    cell.style.width = col.width;

                    if (col.key === 'Ticker') {
                        cell.innerHTML = `<a href="https://www.tradingview.com/chart/?symbol=${row.Ticker || ''}" target="_blank" class="bg-slate-800 hover:bg-slate-700 text-teal-400 px-2.5 py-1 rounded font-black text-xs border border-slate-700 transition-colors">${row.Ticker || 'N/A'}</a>`;
                    } else if (col.key === 'Play_Status') {
                        cell.innerHTML = `<span class="px-2.5 py-1 rounded-lg text-xs font-bold tracking-wider ${row._statusClasses}">${row._statusText}</span>`;
                    } else if (col.key === 'Scenario') {
                        cell.className += " scenario-cell text-slate-300 text-xs";
                        cell.innerText = row.Scenario || '';
                    } else if (col.key === 'Current_Price') {
                        cell.className += " font-mono font-bold text-slate-100";
                        cell.innerText = row.Current_Price !== null ? `$${row.Current_Price.toFixed(2)}` : 'N/A';
                    } else if (col.key === 'Pct_Return') {
                        cell.className += " font-mono font-bold text-xs";
                        if (row.Current_Price === null) {
                            cell.innerHTML = `<span class="text-slate-600">—</span>`;
                        } else {
                            const val = row.Pct_Return;
                            cell.className += val >= 0 ? " text-emerald-400" : " text-red-400";
                            cell.innerText = `${val >= 0 ? '+' : ''}${val.toFixed(2)}%`;
                        }
                    } else if (col.key === 'Link') {
                        if (row.Link && row.Link.startsWith('http')) {
                            cell.innerHTML = `<a href="${row.Link}" target="_blank" class="text-xs bg-slate-900 hover:bg-slate-800 text-blue-400 border border-slate-700 px-3 py-1 rounded-md font-bold">VIEW ↗</a>`;
                        } else {
                            cell.innerHTML = `<span class="text-slate-600">—</span>`;
                        }
                    } else {
                        cell.className += " text-slate-400 text-xs";
                        cell.innerText = row[col.key] || '';
                    }
                    rowStrip.appendChild(cell);
                });
                body.appendChild(rowStrip);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderTableHeaders();
            fetchPlaybookCSV();

            document.getElementById('searchInput').addEventListener('input', executeFilterAndRender);
            document.getElementById('showPassed').addEventListener('change', executeFilterAndRender);
            document.getElementById('showStopOut').addEventListener('change', executeFilterAndRender);
        });
    </script>
</body>
</html>
