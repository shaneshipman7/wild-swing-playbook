<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Swing Trades • Live Playbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">

    <div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
        
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-teal-400 to-emerald-400 flex items-center gap-3">
                    <span>📈</span> Wild Swing Trades
                </h1>
                <p class="text-slate-400 mt-1">Live Playbook Active Database Viewer</p>
            </div>
            <div id="status" class="inline-flex items-center gap-2 bg-slate-900/80 border border-slate-800 px-4 py-2 rounded-full text-sm text-amber-400 font-medium shadow-xl">
                <span class="relative flex h-2 w-2">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2 w-2 bg-amber-500"></span>
                </span>
                Loading real-time data...
            </div>
        </header>

        <div class="mb-6 flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="relative w-full sm:w-72">
                <span class="absolute left-3 top-2 text-slate-500 text-sm">🔍</span>
                <input type="text" id="searchInput" placeholder="Filter by Ticker, Scenario..." 
                       class="w-full bg-slate-900 border border-slate-800 rounded-lg pl-9 pr-4 py-2 text-sm focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 text-slate-200 transition-all placeholder:text-slate-500">
            </div>
            <div class="text-xs text-slate-500 italic w-full sm:w-auto text-right">
                Tip: Click column headers to sort ↕️
            </div>
        </div>

        <div class="overflow-x-auto rounded-xl border border-slate-800 bg-slate-900/40 backdrop-blur-md shadow-2xl">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr id="tableHeaders" class="bg-slate-900/90 border-b border-slate-800 text-slate-300 text-xs font-semibold uppercase tracking-wider select-none">
                        </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-800/60 text-sm text-slate-300">
                    </tbody>
            </table>
        </div>
        
        <div id="emptyState" class="hidden text-center py-12 border border-dashed border-slate-800 rounded-xl mt-4">
            <div class="text-4xl mb-3">📁</div>
            <h3 class="text-slate-400 font-medium">No setups match your search filter</h3>
        </div>
    </div>

    <script>
        const baseUrl = "https://raw.githubusercontent.com/shaneshipman7/wild-swing-playbook/main/Master_Playbook_Database_";
        let currentData = [];
        let globalHeaders = [];
        let sortDirection = {};

        // Hidden system columns to keep the UI elegant
        const hiddenColumns = ['Post_Title', 'Price_Updated'];

        function formatHeaderLabel(header) {
            if (header === 'R_R_Ratio') return 'R:R Ratio';
            if (header === 'Est_Probability') return 'Est. Prob.';
            return header.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        async function loadData() {
            try {
                let response;
                const today = new Date().toISOString().slice(0,10);
                
                response = await fetch(baseUrl + today + ".csv");
                
                if (!response.ok) {
                    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
                    response = await fetch(baseUrl + yesterday + ".csv");
                }
                
                if (!response.ok) throw new Error("Could not find a recent database CSV.");

                const csvText = await response.text();

                // Use PapaParse to safely handle multi-line fields and complex strings
                const parsedResults = Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true
                });

                currentData = parsedResults.data;
                globalHeaders = parsedResults.meta.fields;

                renderHeaders(globalHeaders);
                renderTable(currentData, globalHeaders);
                
                document.getElementById('status').innerHTML = `✅ <span class="text-emerald-400 font-semibold">Live System Connected</span>`;

                // Live search controller mapping logic
                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = currentData.filter(item => {
                        return Object.values(item).some(val => String(val).toLowerCase().includes(term));
                    });
                    renderTable(filtered, globalHeaders);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('status').innerHTML = `⚠️ <span class="text-rose-400 font-semibold">Data Offline</span>`;
            }
        }

        function renderHeaders(headers) {
            const headerContainer = document.getElementById('tableHeaders');
            headerContainer.innerHTML = headers.map(h => {
                if (hiddenColumns.includes(h)) return ''; 
                return `
                    <th class="p-4 cursor-pointer hover:bg-slate-800/80 hover:text-white transition-colors text-xs font-bold uppercase tracking-wider" onclick="sortTable('${h}')">
                        <div class="flex items-center gap-1.5">
                            <span>${formatHeaderLabel(h)}</span>
                            <span class="text-slate-600 text-xs">↕️</span>
                        </div>
                    </th>
                `;
            }).join('');
        }

        function renderTable(data, headers) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            
            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            tbody.innerHTML = data.map(row => {
                let rowHtml = `<tr class="hover:bg-slate-900/60 transition-colors border-b border-slate-800/40">`;
                
                headers.forEach(h => {
                    if (hiddenColumns.includes(h)) return; 
                    
                    let val = row[h] || '';
                    let cellClass = "p-4 align-top whitespace-normal";
                    
                    // Column formatting enhancements
                    if (h === 'Ticker') {
                        val = `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-blue-500/10 text-blue-400 border border-blue-500/20">${val}</span>`;
                    } else if (h === 'Link') {
                        val = `<a href="${val}" target="_blank" class="inline-flex items-center gap-1 text-xs text-teal-400 hover:text-teal-300 bg-teal-500/5 hover:bg-teal-500/10 px-2.5 py-1.5 rounded-lg border border-teal-500/20 transition-all font-medium">Link 🔗</a>`;
                    } else if (h === 'Scenario') {
                        cellClass += " font-medium text-slate-200 max-w-md";
                    } else if (h === 'Current_Price') {
                        val = (val && !isNaN(parseFloat(val))) ? `<span class="text-emerald-400 font-mono font-semibold">$${parseFloat(val).toFixed(2)}</span>` : `<span class="text-slate-600 font-mono">-</span>`;
                    } else if (h === 'Entry' || h === 'Stop_Loss' || h === 'Targets') {
                        cellClass += " font-mono text-xs text-slate-300 max-w-xs";
                    } else if (h === 'Est_Probability' || h === 'R_R_Ratio') {
                        cellClass += " font-mono text-sm text-slate-400";
                    }
                    
                    rowHtml += `<td class="${cellClass}">${val}</td>`;
                });
                
                rowHtml += `</tr>`;
                return rowHtml;
            }).join('');
        }

        function sortTable(key) {
            sortDirection[key] = sortDirection[key] === 'asc' ? 'desc' : 'asc';
            const isAsc = sortDirection[key] === 'asc';
            
            currentData.sort((a, b) => {
                let valA = a[key] || '';
                let valB = b[key] || '';
                
                if (!isNaN(parseFloat(valA)) && isFinite(valA) && !isNaN(parseFloat(valB)) && isFinite(valB)) {
                    return isAsc ? parseFloat(valA) - parseFloat(valB) : parseFloat(valB) - parseFloat(valA);
                }
                
                return isAsc 
                    ? String(valA).localeCompare(String(valB)) 
                    : String(valB).localeCompare(String(valA));
            });
            
            renderTable(currentData, globalHeaders);
        }

        loadData();
    </script>
</body>
</html>
