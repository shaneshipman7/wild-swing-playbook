<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Swing Trades • Live Playbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-8">
    <h1 class="text-3xl font-bold mb-6">📈 Wild Swing Trades - Live Viewer</h1>
    <p id="status" class="mb-4">Loading data...</p>
    <table id="table" class="w-full border-collapse border border-slate-700"></table>

    <script>
        const url = "https://raw.githubusercontent.com/shaneshipman7/wild-swing-playbook/main/Master_Playbook_Database_";
        
        async function loadData() {
            const today = new Date().toISOString().slice(0,10);
            let response = await fetch(url + today + ".csv");
            
            if (!response.ok) {
                const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
                response = await fetch(url + yesterday + ".csv");
            }
            
            const csv = await response.text();
            const rows = csv.trim().split('\n');
            const headers = rows[0].split(',');
            
            let html = '<tr>' + headers.map(h => `<th class="border p-2 bg-slate-800">${h}</th>`).join('') + '</tr>';
            
            rows.slice(1).forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                html += '<tr>' + cols.map(c => `<td class="border p-2">${c.replace(/^"|"$/g,'')}</td>`).join('') + '</tr>';
            });
            
            document.getElementById('table').innerHTML = html;
            document.getElementById('status').innerHTML = '✅ Loaded latest data';
        }
        
        loadData();
    </script>
</body>
</html>
