<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Swing Trades • Live Playbook</title>
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PapaParse for bulletproof CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased selection:bg-teal-500/30">

    <div class="w-full max-w-[1600px] mx-auto p-4 sm:p-6 lg:p-8">
        
        <!-- Header Section -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-teal-400 to-emerald-400 flex items-center gap-3">
                    <span>📈</span> Wild Swing Trades
                </h1>
                <p class="text-slate-400 text-lg mt-1 font-medium">Live Playbook Active Database Viewer</p>
            </div>
            <div id="status" class="inline-flex items-center gap-2 bg-slate-900/80 border border-slate-800 px-5 py-2.5 rounded-full text-base text-amber-400 font-semibold shadow-xl">
                <span class="relative flex h-2.5 w-2.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-amber-500"></span>
                </span>
                Loading real-time data...
            </div>
        </header>

        <!-- Controls Toolbar -->
        <div class="mb-6 flex flex-col sm:flex-row gap-4 items-center justify-between">
            <!-- Search Bar -->
            <div class="relative w-full sm:w-96">
                <span class="absolute left-3.5 top-3 text-slate-400 text-base">🔍</span>
                <input type="text" id="searchInput" placeholder="Search by Ticker, Scenario, Status..." 
                       class="w-full bg-slate-900 border border-slate-800 rounded-xl pl-10 pr-4 py-3 text-base focus:outline-none focus:border-teal-500 focus:ring-2 focus:ring-teal-500/20 text-slate-100 transition-all placeholder:text-slate-500 font-medium">
            </div>
            <div class="text-sm text-slate-400 bg-slate-900/40 border border-slate-800 px-4 py-2 rounded-lg font-medium">
                Tip: Click column headers to sort ↕️
            </div>
        </div>

        <!-- Table Container -->
        <div class="overflow-x-auto rounded-xl border border-slate-800 bg-slate-900/20 backdrop-blur-md shadow-2xl">
            <table class="w-full text-left border-collapse min-w-[1200px]">
                <thead>
                    <tr id="tableHeaders" class="bg-slate-900/80 border-b border-slate-800 text-slate-200 text-sm font-bold uppercase tracking-wider select-none">
                        <!-- Dynamic headers get generated here -->
                    </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-800/50 text-base text-slate-300">
                    <!-- Dynamic rows get generated here -->
                </tbody>
            </table>
        </div>
        
        <!-- Empty State View -->
        <div id="emptyState" class="hidden text-center py-16 border border-dashed border-slate-800 rounded-xl mt-4">
            <div class="text-5xl mb-4">📁</div>
            <h3 class="text-slate-400 text-lg font-bold">No setups match your search filter</h3>
        </div>
    </div>

    <script>
        const baseUrl = "https://raw.githubusercontent.com/shaneshipman7/wild-swing-playbook/main/Master_Playbook_Database_";
        let currentData = [];
        let globalHeaders = [];
        let sortDirection = {};

        // Hidden system columns to keep the UI elegant
        const hiddenColumns = ['Post_Title', 'Price_Updated'];

        function formatHeaderLabel(header) {
            if (header === 'R_R_Ratio') return 'R:R Ratio';
            if (header === 'Est_Probability') return 'Est. Prob.';
            if (header === 'Play_Status') return 'Play Status';
            return header.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        // Dynamic Trade Status Generator
        function calculatePlayStatus(row) {
            const currentPrice = parseFloat(row['Current_Price']);
            const entryText = String(row['Entry']);
            
            if (!currentPrice || isNaN(currentPrice) || !entryText) {
                return `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-slate-800 text-slate-400 border border-slate-700">TRACKING</span>`;
            }

            // Extract numbers from target strings (e.g., "$13.00 - $13.80" -> 13.00)
            const numbers = entryText.match(/\d+(\.\d+)?/g);
            if (!numbers || numbers.length === 0) {
                return `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-slate-800 text-slate-400 border border-slate-700">TRACKING</span>`;
            }

            const parsedEntries = numbers.map(Number);
            const lowEntry = Math.min(...parsedEntries);
            const highEntry = Math.max(...parsedEntries);

            // Simple conditional matching logic against current live pricing strings
            if (entryText.toLowerCase().includes('above') && currentPrice >= lowEntry) {
                return `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 animate-pulse">🎯 TRIGGERED</span>`;
            } else if (currentPrice >= lowEntry && currentPrice <= (highEntry || lowEntry * 1.02)) {
                return `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-teal-500/10 text-teal-400 border border-teal-500/20">🔥 IN ZONE</span>`;
            } else if (currentPrice < lowEntry) {
                return `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-amber-500/10 text-amber-400 border border-amber-500/20">⏳ PENDING</span>`;
            } else {
                return `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-purple-500/10 text-purple-400 border border-purple-500/20">🚀 PASSED</span>`;
            }
        }

        async function loadData() {
            try {
                let response;
                const today = new Date().toISOString().slice(0,10);
                
                response = await fetch(baseUrl + today + ".csv");
                
                if (!response.ok) {
                    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
                    response = await fetch(baseUrl + yesterday + ".csv");
                }
                
                if (!response.ok) throw new Error("Could not find a recent database CSV.");

                const csvText = await response.text();

                const parsedResults = Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true
                });

                currentData = parsedResults.data;
                globalHeaders = parsedResults.meta.fields;

                // Inject a custom header at position 3 for Play Status tracking metrics
                if (!globalHeaders.includes('Play_Status')) {
                    globalHeaders.splice(2, 0, 'Play_Status');
                }

                renderHeaders(globalHeaders);
                renderTable(currentData, globalHeaders);
                
                document.getElementById('status').innerHTML = `✅ <span class="text-emerald-400 font-bold">Live System Connected</span>`;

                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = currentData.filter(item => {
                        return Object.values(item).some(val => String(val).toLowerCase().includes(term));
                    });
                    renderTable(filtered, globalHeaders);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('status').innerHTML = `⚠️ <span class="text-rose-400 font-bold">Data Offline</span>`;
            }
        }

        function renderHeaders(headers) {
            const headerContainer = document.getElementById('tableHeaders');
            headerContainer.innerHTML = headers.map(h => {
                if (hiddenColumns.includes(h)) return ''; 
                return `
                    <th class="p-4 cursor-pointer hover:bg-slate-800/80 hover:text-white transition-colors text-sm font-bold uppercase tracking-wider" onclick="sortTable('${h}')">
                        <div class="flex items-center gap-1.5">
                            <span>${formatHeaderLabel(h)}</span>
                            <span class="text-slate-500 text-xs">↕️</span>
                        </div>
                    </th>
                `;
            }).join('');
        }

        function renderTable(data, headers) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            
            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            tbody.innerHTML = data.map(row => {
                let rowHtml = `<tr class="hover:bg-slate-900/40 transition-colors border-b border-slate-800/40">`;
                
                headers.forEach(h => {
                    if (hiddenColumns.includes(h)) return; 
                    
                    let val = row[h] || '';
                    let cellClass = "p-4 align-middle whitespace-normal";
                    
                    if (h === 'Play_Status') {
                        val = calculatePlayStatus(row);
                    } else if (h === 'Ticker') {
                        val = `<span class="inline-flex items-center px-3 py-1.5 rounded-lg text-sm font-bold bg-blue-500/10 text-blue-400 border border-blue-500/20">${val}</span>`;
                    } else if (h === 'Link') {
                        val = `<a href="${val}" target="_blank" class="inline-flex items-center gap-1 text-sm text-teal-400 hover:text-teal-300 bg-teal-500/5 hover:bg-teal-500/10 px-3 py-2 rounded-xl border border-teal-500/20 transition-all font-semibold shadow-sm">View 🔗</a>`;
                    } else if (h === 'Scenario') {
                        cellClass += " font-semibold text-slate-100 max-w-sm text-base";
                    } else if (h === 'Current_Price') {
                        cellClass += " min-w-[120px]";
                        val = (val && !isNaN(parseFloat(val))) ? `<span class="text-emerald-400 font-mono font-bold text-lg">$${parseFloat(val).toFixed(2)}</span>` : `<span class="text-slate-600 font-mono">-</span>`;
                    } else if (h === 'Entry' || h === 'Stop_Loss' || h === 'Targets') {
                        cellClass += " font-mono text-sm text-slate-300 max-w-xs leading-relaxed font-medium";
                    } else if (h === 'Est_Probability' || h === 'R_R_Ratio') {
                        cellClass += " font-mono text-base font-semibold text-slate-400";
                    } else if (h === 'Date') {
                        cellClass += " text-slate-400 font-medium text-sm whitespace-nowrap";
                    }
                    
                    rowHtml += `<td class="${cellClass}">${val}</td>`;
                });
                
                rowHtml += `</tr>`;
                return rowHtml;
            }).join('');
        }

        function sortTable(key) {
            sortDirection[key] = sortDirection[key] === 'asc' ? 'desc' : 'asc';
            const isAsc = sortDirection[key] === 'asc';
            
            currentData.sort((a, b) => {
                let valA = a[key] || '';
                let valB = b[key] || '';
                
                if (!isNaN(parseFloat(valA)) && isFinite(valA) && !isNaN(parseFloat(valB)) && isFinite(valB)) {
                    return isAsc ? parseFloat(valA) - parseFloat(valB) : parseFloat(valB) - parseFloat(valA);
                }
                
                return isAsc 
                    ? String(valA).localeCompare(String(valB)) 
                    : String(valB).localeCompare(String(valA));
            });
            
            renderTable(currentData, globalHeaders);
        }

        loadData();
    </script>
</body>
</html>
