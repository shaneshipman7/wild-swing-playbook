<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Swing Trades • Live Playbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
   
    <style>
        .custom-scroll::-webkit-scrollbar { height: 18px; }
        .custom-scroll::-webkit-scrollbar-track { background: #020617; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 9999px; border: 4px solid #020617; }
        .table-wrapper { height: calc(100vh - 240px); overflow: auto; }
        .table-cell { font-size: 1.25rem; line-height: 1.5; font-weight: 600; }
        .header-cell { font-size: 1.05rem; line-height: 1.35; white-space: nowrap; font-weight: 700; }
        .scenario-cell { white-space: normal !important; line-height: 1.45; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased">
    <div class="w-full px-4 sm:px-6 lg:px-8 py-6 h-screen flex flex-col">
        <header class="flex-shrink-0 mb-5 border-b border-slate-800 pb-5">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-teal-400 to-emerald-400 flex items-center gap-3">
                        📈 Wild Swing Trades
                    </h1>
                    <p class="text-slate-300 text-xl mt-1 font-bold">Live Playbook • Active Database</p>
                </div>
                <div class="px-5 py-2 bg-emerald-900/60 border border-emerald-500 rounded-2xl text-emerald-400 font-bold flex items-center gap-2 text-sm">
                    ● LIVE
                </div>
            </div>
        </header>
        <div class="flex-shrink-0 flex gap-4 mb-4 items-center">
            <div class="relative flex-1 max-w-md">
                <span class="absolute left-4 top-4 text-slate-400">🔍</span>
                <input type="text" id="searchInput" placeholder="Search..." class="w-full bg-slate-900 border border-slate-700 rounded-2xl pl-12 py-3.5 text-base focus:border-teal-400">
            </div>
            <div class="text-sm text-slate-400">Click headers to sort • Scroll horizontally</div>
        </div>
        <div class="flex-1 table-wrapper custom-scroll border border-slate-800 bg-slate-900/70 backdrop-blur-xl rounded-2xl overflow-auto">
            <div class="min-w-[3100px]">
                <div id="tableHeaders" class="flex sticky top-0 bg-slate-900 border-b border-slate-700 z-20"></div>
                <div id="tableBody" class="flex flex-col text-slate-200"></div>
            </div>
        </div>
        <div id="emptyState" class="hidden text-center py-12 text-slate-400">No matches found</div>
    </div>

    <script>
        const baseUrl = "https://raw.githubusercontent.com/shaneshipman7/wild-swing-playbook/main/Master_Playbook_Database_";
        let currentData = [];
        let globalHeaders = [];
        let sortDirection = {};
        const hiddenColumns = ['Post_Title', 'Price_Updated'];
        const columnWidths = {
            'Ticker': '115px', 'Play_Status': '165px', 'Scenario': '520px',
            'Entry': '310px', 'Stop_Loss': '270px', 'Targets': '350px',
            'R_R_Ratio': '145px', 'Est_Probability': '155px', 
            'Pct_Return': '160px', 'Link': '125px',
            'Current_Price': '165px', 'Date': '135px'
        };

        function formatHeaderLabel(h) {
            const map = { 
                'R_R_Ratio': 'R:R RATIO', 
                'Est_Probability': 'EST. PROB.',
                'Pct_Return': '% RETURN',
                'Play_Status': 'STATUS' 
            };
            return map[h] || h.replace(/_/g, ' ').toUpperCase();
        }

        function getNumericProbability(val) {
            if (!val) return 0;
            let str = String(val).replace('~', '').replace('%', '').trim();
            const numbers = str.match(/\d+/g);
            if (!numbers) return 0;
            const nums = numbers.map(Number);
            return Math.round(nums.reduce((a, b) => a + b, 0) / nums.length);
        }

        function getNumericRR(val) {
            if (!val) return 0;
            const match = String(val).match(/(\d+\.?\d*)/);
            return match ? parseFloat(match[1]) : 0;
        }

        // Much better % Return calculation
        function getPctReturn(row) {
            const entryStr = String(row.Entry || '');
            const targetsStr = String(row.Targets || '');

            // Extract first realistic entry price
            let entryMatch = entryStr.match(/\$?(\d{1,4}(?:,\d{3})*(?:\.\d+)?)/);
            const entryPrice = entryMatch ? parseFloat(entryMatch[1].replace(/,/g, '')) : 0;

            // Extract highest target price
            const targetMatches = targetsStr.match(/\$?(\d{1,4}(?:,\d{3})*(?:\.\d+)?)/g) || [];
            let bestTarget = 0;
            targetMatches.forEach(m => {
                const num = parseFloat(m.replace(/\$|,/g, ''));
                if (num > bestTarget) bestTarget = num;
            });

            if (entryPrice <= 0 || bestTarget <= entryPrice) return 0;

            const pct = Math.round(((bestTarget - entryPrice) / entryPrice) * 100);
            return Math.min(pct, 300); // Reasonable cap
        }

        function getPlayStatusValue(row) {
            const cp = parseFloat(row.Current_Price);
            const entry = String(row.Entry || '');
            if (!cp || isNaN(cp) || !entry) return 'TRACKING';
            const nums = entry.match(/\d+(\.\d+)?/g) || [];
            if (!nums.length) return 'TRACKING';
            const low = Math.min(...nums.map(Number));
            const high = Math.max(...nums.map(Number));
            if (entry.toLowerCase().includes('above') && cp >= low) return 'TRIGGERED';
            if (cp >= low && cp <= (high || low * 1.02)) return 'IN ZONE';
            if (cp < low) return 'PENDING';
            return 'PASSED';
        }

        function calculatePlayStatus(row) {
            const status = getPlayStatusValue(row);
            const styles = {
                TRIGGERED: 'bg-emerald-600/30 text-emerald-300 border border-emerald-500',
                'IN ZONE': 'bg-teal-600/30 text-teal-300 border border-teal-500',
                PENDING: 'bg-amber-600/30 text-amber-300 border border-amber-500',
                PASSED: 'bg-purple-600/30 text-purple-300 border border-purple-500',
                TRACKING: 'bg-slate-700 text-slate-400 border border-slate-600'
            };
            return `<span class="inline-flex px-4 py-1.5 rounded-lg text-sm font-bold ${styles[status]}">${status}</span>`;
        }

        async function loadData() {
            try {
                const today = new Date().toISOString().slice(0,10);
                const yesterday = new Date(Date.now() - 864e5).toISOString().slice(0,10);
                const dayBefore = new Date(Date.now() - 2*864e5).toISOString().slice(0,10);

                const urls = [baseUrl + today + ".csv", baseUrl + yesterday + ".csv", baseUrl + dayBefore + ".csv"];

                let text = null;
                let loadedUrl = "";

                for (let url of urls) {
                    try {
                        const res = await fetch(url);
                        if (res.ok) {
                            text = await res.text();
                            loadedUrl = url;
                            console.log("✅ Loaded:", url);
                            break;
                        }
                    } catch(e) {}
                }

                if (!text) {
                    console.error("❌ No CSV found");
                    return;
                }

                const parsed = Papa.parse(text, {header: true, skipEmptyLines: true});
                currentData = parsed.data;
                globalHeaders = parsed.meta.fields;

                if (!globalHeaders.includes('Play_Status')) globalHeaders.splice(2, 0, 'Play_Status');
                if (!globalHeaders.includes('Pct_Return')) {
                    const rrIndex = globalHeaders.indexOf('R_R_Ratio');
                    if (rrIndex !== -1) globalHeaders.splice(rrIndex + 1, 0, 'Pct_Return');
                }

                globalHeaders = globalHeaders.filter(h => h !== 'Date');
                globalHeaders.push('Date');

                renderHeaders();
                renderTable(currentData);
                console.log(`✅ Loaded ${currentData.length} rows`);
            } catch(e) { console.error(e); }
        }

        function renderHeaders() {
            const el = document.getElementById('tableHeaders');
            el.innerHTML = globalHeaders.map(h => {
                if (hiddenColumns.includes(h)) return '';
                const w = columnWidths[h] || '160px';
                return `<div onclick="sortTable('${h}')" class="header-cell p-4 cursor-pointer hover:bg-slate-800 flex items-center border-r border-slate-700 last:border-r-0" style="width: ${w}; flex-shrink: 0;">${formatHeaderLabel(h)}</div>`;
            }).join('');
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            if (!data.length) {
                document.getElementById('emptyState').classList.remove('hidden');
                return;
            }
            document.getElementById('emptyState').classList.add('hidden');
            tbody.innerHTML = data.map(row => {
                let html = `<div class="flex hover:bg-slate-800/70 border-b border-slate-800 last:border-b-0">`;
                globalHeaders.forEach(h => {
                    if (hiddenColumns.includes(h)) return;
                    const w = columnWidths[h] || '160px';
                    let val = row[h] || '';
                    let cls = `table-cell p-4 border-r border-slate-700 last:border-r-0 flex items-center`;

                    if (h === 'Play_Status') {
                        val = calculatePlayStatus(row);
                        cls += " justify-center";
                    } else if (h === 'Ticker') {
                        val = `<a href="https://www.tradingview.com/symbols/${val}/" target="_blank" class="text-blue-400 hover:text-blue-300 hover:underline font-bold">${val}</a>`;
                    } else if (h === 'Link') {
                        val = val ? `<a href="${val}" target="_blank" class="text-teal-400 hover:underline">View</a>` : '';
                    } else if (h === 'Scenario') {
                        cls += " scenario-cell";
                        val = val.replace(/([a-z])([A-Z])/g, '$1 $2').replace(/Buy([A-Z])/g, 'Buy $1');
                    } else if (h === 'Current_Price') {
                        val = val ? `<span class="font-mono text-emerald-400">$${parseFloat(val).toFixed(2)}</span>` : '-';
                    } else if (h === 'Est_Probability') {
                        val = val ? `<span class="font-mono">${val}</span>` : '-';
                    } else if (h === 'Pct_Return') {
                        const pct = getPctReturn(row);
                        val = pct ? `<span class="font-mono text-emerald-400 font-bold">+${pct}%</span>` : '-';
                    }
                    html += `<div class="${cls}" style="width: ${w}; flex-shrink: 0;">${val}</div>`;
                });
                html += `</div>`;
                return html;
            }).join('');
        }

        function sortTable(key) {
            sortDirection[key] = sortDirection[key] === 'asc' ? 'desc' : 'asc';
            const asc = sortDirection[key] === 'asc';

            currentData.sort((a, b) => {
                let va = a[key] || '';
                let vb = b[key] || '';

                if (key === 'Est_Probability') {
                    va = getNumericProbability(va);
                    vb = getNumericProbability(vb);
                } else if (key === 'R_R_Ratio') {
                    va = getNumericRR(va);
                    vb = getNumericRR(vb);
                } else if (key === 'Pct_Return') {
                    va = getPctReturn(a);
                    vb = getPctReturn(b);
                } else if (key === 'Play_Status') {
                    va = getPlayStatusValue(a);
                    vb = getPlayStatusValue(b);
                }

                if (!isNaN(parseFloat(va)) && !isNaN(parseFloat(vb))) {
                    return asc ? parseFloat(va) - parseFloat(vb) : parseFloat(vb) - parseFloat(va);
                }

                return asc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
            });

            renderTable(currentData);
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase().trim();
                const filtered = term ? currentData.filter(row => Object.values(row).some(v => String(v).toLowerCase().includes(term))) : currentData;
                renderTable(filtered);
            });
            loadData();
        });
    </script>
</body>
</html>
