<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Swing Trades • Live Playbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Force custom scrollbar visibility across all modern web browsers */
        .custom-scroll::-webkit-scrollbar {
            height: 14px !important;
            display: block !important;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #020617 !important; /* matches slate-950 */
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #334155 !important; /* high visibility slate-700 slider */
            border: 3px solid #020617 !important;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #475569 !important; /* slate-600 */
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased selection:bg-teal-500/30 overflow-x-hidden">

    <div class="w-full px-4 sm:px-6 lg:px-8 py-6">
        
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-teal-400 to-emerald-400 flex items-center gap-3">
                    <span>📈</span> Wild Swing Trades
                </h1>
                <p class="text-slate-300 text-xl mt-1 font-bold">Live Playbook Active Database Viewer</p>
            </div>
            <div id="status" class="inline-flex items-center gap-2 bg-slate-900/80 border border-slate-800 px-6 py-3 rounded-full text-lg text-amber-400 font-bold shadow-xl">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-amber-500"></span>
                </span>
                Loading real-time data...
            </div>
        </header>

        <div class="mb-6 flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="relative w-full sm:w-96">
                <span class="absolute left-4 top-3.5 text-slate-400 text-lg">🔍</span>
                <input type="text" id="searchInput" placeholder="Search by Ticker, Scenario, Status..." 
                       class="w-full bg-slate-900 border border-slate-700 rounded-xl pl-12 pr-4 py-3.5 text-lg focus:outline-none focus:border-teal-400 focus:ring-2 focus:ring-teal-500/20 text-slate-100 transition-all placeholder:text-slate-500 font-bold shadow-inner">
            </div>
            <div class="text-base font-bold text-slate-300 bg-slate-900/60 border border-slate-800 px-5 py-3 rounded-xl shadow-md">
                Tip: Click column headers to sort ↕️
            </div>
        </div>

        <div class="text-sm text-teal-400 font-bold mb-4 flex items-center gap-2 bg-teal-500/5 border border-teal-500/10 px-4 py-3 rounded-xl w-fit">
            <span>↔️</span> Use the slider rail at the bottom of the grid framework to scroll out right and view complete pricing matrices.
        </div>

        <div class="w-full overflow-x-auto custom-scroll rounded-2xl border border-slate-800 bg-slate-900/30 backdrop-blur-xl shadow-2xl">
            <table class="text-left border-collapse table-auto w-full">
                <thead>
                    <tr id="tableHeaders" class="bg-slate-900/90 border-b border-slate-700 text-slate-100 text-base font-extrabold uppercase tracking-wider select-none">
                        </tr>
                </thead>
                <tbody id="tableBody" class="divide-y divide-slate-800/80 text-lg text-slate-200 font-semibold">
                    </tbody>
            </table>
        </div>
        
        <div id="emptyState" class="hidden text-center py-20 border border-dashed border-slate-800 rounded-2xl mt-4">
            <div class="text-6xl mb-4">📁</div>
            <h3 class="text-slate-400 text-xl font-bold">No setups match your search filter</h3>
        </div>
    </div>

    <script>
        const baseUrl = "https://raw.githubusercontent.com/shaneshipman7/wild-swing-playbook/main/Master_Playbook_Database_";
        let currentData = [];
        let globalHeaders = [];
        let sortDirection = {};

        const hiddenColumns = ['Post_Title', 'Price_Updated'];

        // Strict, non-negotiable raw pixel widths mapped to stop the browser from squishing cells
        const columnWidths = {
            'Date': '130px',
            'Ticker': '110px',
            'Play_Status': '160px',
            'Scenario': '340px',
            'Entry': '220px',
            'Stop_Loss': '180px',
            'Targets': '220px',
            'R_R_Ratio': '120px',
            'Est_Probability': '120px',
            'Link': '110px',
            'Current_Price': '160px'
        };

        function formatHeaderLabel(header) {
            if (header === 'R_R_Ratio') return 'R:R Ratio';
            if (header === 'Est_Probability') return 'Est. Prob.';
            if (header === 'Play_Status') return 'Play Status';
            return header.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        function calculatePlayStatus(row) {
            const currentPrice = parseFloat(row['Current_Price']);
            const entryText = String(row['Entry']);
            
            if (!currentPrice || isNaN(currentPrice) || !entryText) {
                return `<span class="inline-flex items-center px-3 py-1 rounded-md text-xs font-black bg-slate-800 text-slate-400 border border-slate-700 tracking-wider">TRACKING</span>`;
            }

            const numbers = entryText.match(/\d+(\.\d+)?/g);
            if (!numbers || numbers.length === 0) {
                return `<span class="inline-flex items-center px-3 py-1 rounded-md text-xs font-black bg-slate-800 text-slate-400 border border-slate-700 tracking-wider">TRACKING</span>`;
            }

            const parsedEntries = numbers.map(Number);
            const lowEntry = Math.min(...parsedEntries);
            const highEntry = Math.max(...parsedEntries);

            if (entryText.toLowerCase().includes('above') && currentPrice >= lowEntry) {
                return `<span class="inline-flex items-center px-3 py-1 rounded-md text-xs font-black bg-emerald-500/20 text-emerald-400 border border-emerald-500/40 tracking-wider animate-pulse">🎯 TRIGGERED</span>`;
            } else if (currentPrice >= lowEntry && currentPrice <= (highEntry || lowEntry * 1.02)) {
                return `<span class="inline-flex items-center px-3 py-1 rounded-md text-xs font-black bg-teal-500/20 text-teal-300 border border-teal-500/40 tracking-wider">🔥 IN ZONE</span>`;
            } else if (currentPrice < lowEntry) {
                return `<span class="inline-flex items-center px-3 py-1 rounded-md text-xs font-black bg-amber-500/20 text-amber-400 border border-amber-500/40 tracking-wider">⏳ PENDING</span>`;
            } else {
                return `<span class="inline-flex items-center px-3 py-1 rounded-md text-xs font-black bg-purple-500/20 text-purple-400 border border-purple-500/40 tracking-wider">🚀 PASSED</span>`;
            }
        }

        async function loadData() {
            try {
                let response;
                const today = new Date().toISOString().slice(0,10);
                
                response = await fetch(baseUrl + today + ".csv");
                
                if (!response.ok) {
                    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
                    response = await fetch(baseUrl + yesterday + ".csv");
                }
                
                if (!response.ok) throw new Error("Could not find a recent database CSV.");

                const csvText = await response.text();

                const parsedResults = Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true
                });

                currentData = parsedResults.data;
                globalHeaders = parsedResults.meta.fields;

                if (!globalHeaders.includes('Play_Status')) {
                    globalHeaders.splice(2, 0, 'Play_Status');
                }

                renderHeaders(globalHeaders);
                renderTable(currentData, globalHeaders);
                
                document.getElementById('status').innerHTML = `✅ <span class="text-emerald-400 font-extrabold">Live System Connected</span>`;

                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = currentData.filter(item => {
                        return Object.values(item).some(val => String(val).toLowerCase().includes(term));
                    });
                    renderTable(filtered, globalHeaders);
                });

            } catch (err) {
                console.error(err);
                document.getElementById('status').innerHTML = `⚠️ <span class="text-rose-400 font-extrabold">Data Offline</span>`;
            }
        }

        function renderHeaders(headers) {
            const headerContainer = document.getElementById('tableHeaders');
            headerContainer.innerHTML = headers.map(h => {
                if (hiddenColumns.includes(h)) return ''; 
                const pWidth = columnWidths[h] || '150px';
                // CRITICAL FIX: Applies hard coded static style attributes directly to block the cell scaling engine
                return `
                    <th class="p-5 cursor-pointer hover:bg-slate-800/80 hover:text-white transition-colors text-base font-black tracking-wide" 
                        style="width: ${pWidth}; min-width: ${pWidth}; max-width: ${pWidth};"
                        onclick="sortTable('${h}')">
                        <div class="flex items-center gap-1.5 whitespace-nowrap">
                            <span>${formatHeaderLabel(h)}</span>
                            <span class="text-slate-500 text-sm">↕️</span>
                        </div>
                    </th>
                `;
            }).join('');
        }

        function renderTable(data, headers) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            
            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            tbody.innerHTML = data.map(row => {
                let rowHtml = `<tr class="hover:bg-slate-900/50 transition-colors border-b border-slate-800/60">`;
                
                headers.forEach(h => {
                    if (hiddenColumns.includes(h)) return; 
                    
                    let val = row[h] || '';
                    const pWidth = columnWidths[h] || '150px';
                    let cellClass = "p-5 align-middle whitespace-normal break-words";
                    
                    if (h === 'Play_Status') {
                        cellClass += " text-center whitespace-nowrap";
                        val = calculatePlayStatus(row);
                    } else if (h === 'Ticker') {
                        val = `<span class="inline-flex items-center px-3 py-1.5 rounded-lg text-sm font-black bg-blue-500/10 text-blue-400 border border-blue-500/30 tracking-wider">${val}</span>`;
                    } else if (h === 'Link') {
                        val = `<a href="${val}" target="_blank" class="inline-flex items-center gap-1.5 text-sm text-teal-400 hover:text-teal-300 bg-teal-500/10 hover:bg-teal-500/20 px-3.5 py-2 rounded-xl border border-teal-500/30 transition-all font-bold shadow-sm">View 🔗</a>`;
                    } else if (h === 'Scenario') {
                        cellClass += " font-bold text-slate-100 text-base leading-relaxed";
                    } else if (h === 'Current_Price') {
                        val = (val && !isNaN(parseFloat(val))) ? `<span class="text-emerald-400 font-mono font-black text-xl bg-emerald-500/5 px-2.5 py-1.5 rounded-lg border border-emerald-500/10">$${parseFloat(val).toFixed(2)}</span>` : `<span class="text-slate-600 font-mono font-bold">-</span>`;
                    } else if (h === 'Entry' || h === 'Stop_Loss' || h === 'Targets') {
                        cellClass += " font-mono text-sm text-slate-200 leading-relaxed font-bold";
                    } else if (h === 'Est_Probability' || h === 'R_R_Ratio') {
                        cellClass += " font-mono text-base font-extrabold text-slate-400 text-center";
                    } else if (h === 'Date') {
                        cellClass += " text-slate-400 font-bold text-sm";
                    }
                    
                    // CRITICAL FIX: Inline sizing blocks injected directly onto structural row cells
                    rowHtml += `<td class="${cellClass}" style="width: ${pWidth}; min-width: ${pWidth}; max-width: ${pWidth};">${val}</td>`;
                });
                
                rowHtml += `</tr>`;
                return rowHtml;
            }).join('');
        }

        function sortTable(key) {
            sortDirection[key] = sortDirection[key] === 'asc' ? 'desc' : 'asc';
            const isAsc = sortDirection[key] === 'asc';
            
            currentData.sort((a, b) => {
                let valA = a[key] || '';
                let valB = b[key] || '';
                
                if (!isNaN(parseFloat(valA)) && isFinite(valA) && !isNaN(parseFloat(valB)) && isFinite(valB)) {
                    return isAsc ? parseFloat(valA) - parseFloat(valB) : parseFloat(valB) - parseFloat(valA);
                }
                
                return isAsc 
                    ? String(valA).localeCompare(String(valB)) 
                    : String(valB).localeCompare(String(valA));
            });
            
            renderTable(currentData, globalHeaders);
        }

        loadData();
    </script>
</body>
</html>
