<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wild Swing Trades • Live Playbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <style>
        .custom-scroll::-webkit-scrollbar {
            height: 18px;
            display: block;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: #020617;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #475569;
            border: 4px solid #020617;
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .table-container {
            max-height: calc(100vh - 280px); /* Leaves room for header */
            overflow-y: auto;
            overflow-x: auto;
        }

        .table-cell {
            font-size: 1.1rem;
            line-height: 1.55;
        }
        
        @media (max-width: 768px) {
            .table-cell {
                font-size: 1rem;
            }
            .table-container {
                max-height: calc(100vh - 320px);
            }
        }

        .scenario-cell {
            white-space: normal !important;
            line-height: 1.5;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans antialiased overflow-hidden">
    <div class="w-full px-4 sm:px-6 lg:px-8 py-6 max-w-[100vw] h-screen flex flex-col">
       
        <header class="flex-shrink-0 mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4 border-b border-slate-800 pb-6">
            <div>
                <h1 class="text-4xl md:text-5xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-teal-400 to-emerald-400 flex items-center gap-3">
                    <span>📈</span> Wild Swing Trades
                </h1>
                <p class="text-slate-300 text-xl md:text-2xl mt-1 font-bold">Live Playbook • Active Database Viewer</p>
            </div>
            
            <div id="status" class="inline-flex items-center gap-2 bg-slate-900/80 border border-slate-800 px-6 py-3 rounded-full text-lg text-emerald-400 font-bold shadow-xl">
                <span class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                Live System Connected
            </div>
        </header>

        <div class="flex-shrink-0 mb-4 flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="relative w-full sm:w-96">
                <span class="absolute left-4 top-3.5 text-slate-400 text-xl">🔍</span>
                <input type="text" id="searchInput" placeholder="Search by Ticker, Scenario, Status..."
                       class="w-full bg-slate-900 border border-slate-700 rounded-2xl pl-12 pr-4 py-4 text-lg focus:outline-none focus:border-teal-400 focus:ring-2 focus:ring-teal-500/20 text-slate-100 placeholder:text-slate-500 font-bold shadow-inner">
            </div>
            <div class="text-base font-bold text-slate-300 bg-slate-900/60 border border-slate-800 px-5 py-3 rounded-xl shadow-md">
                Tip: Click headers to sort • Swipe horizontally
            </div>
        </div>

        <div class="flex-shrink-0 text-sm text-teal-400 font-bold mb-4 flex items-center gap-2 bg-teal-500/5 border border-teal-500/10 px-5 py-3 rounded-xl">
            ↔️ Horizontal scroll enabled — swipe or use scrollbar to see full content
        </div>

        <!-- Main Scrollable Table Area -->
        <div class="flex-1 table-container custom-scroll rounded-3xl border border-slate-800 bg-slate-900/30 backdrop-blur-xl shadow-2xl overflow-auto">
            <div class="min-w-[2850px] flex flex-col">
                <div id="tableHeaders" class="flex bg-slate-900/95 border-b border-slate-700 text-slate-100 font-extrabold uppercase tracking-wider select-none sticky top-0 z-10">
                </div>
                
                <div id="tableBody" class="flex flex-col divide-y divide-slate-800/80 text-slate-200 font-bold">
                </div>
            </div>
        </div>

        <div id="emptyState" class="hidden text-center py-20 border border-dashed border-slate-800 rounded-2xl mt-4">
            <div class="text-6xl mb-4">📁</div>
            <h3 class="text-slate-400 text-xl font-bold">No setups match your search</h3>
        </div>
    </div>

    <script>
        // ... [Same script as last version - unchanged] ...
        const baseUrl = "https://raw.githubusercontent.com/shaneshipman7/wild-swing-playbook/main/Master_Playbook_Database_";
        let currentData = [];
        let globalHeaders = [];
        let sortDirection = {};
        const hiddenColumns = ['Post_Title', 'Price_Updated'];

        const columnWidths = {
            'Date': '145px',
            'Ticker': '125px',
            'Play_Status': '185px',
            'Scenario': '580px',
            'Entry': '310px',
            'Stop_Loss': '260px',
            'Targets': '340px',
            'R_R_Ratio': '145px',
            'Est_Probability': '155px',
            'Link': '130px',
            'Current_Price': '165px'
        };

        function formatHeaderLabel(header) {
            if (header === 'R_R_Ratio') return 'R:R Ratio';
            if (header === 'Est_Probability') return 'Est. Prob.';
            if (header === 'Play_Status') return 'Play Status';
            return header.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        function getPlayStatusValue(row) {
            const currentPrice = parseFloat(row['Current_Price']);
            const entryText = String(row['Entry'] || '');
            if (!currentPrice || isNaN(currentPrice) || !entryText) return 'TRACKING';
            const numbers = entryText.match(/\d+(\.\d+)?/g);
            if (!numbers || numbers.length === 0) return 'TRACKING';
            const lowEntry = Math.min(...numbers.map(Number));
            const highEntry = Math.max(...numbers.map(Number));
            if (entryText.toLowerCase().includes('above') && currentPrice >= lowEntry) return 'TRIGGERED';
            if (currentPrice >= lowEntry && currentPrice <= (highEntry || lowEntry * 1.02)) return 'IN ZONE';
            if (currentPrice < lowEntry) return 'PENDING';
            return 'PASSED';
        }

        function calculatePlayStatus(row) {
            const status = getPlayStatusValue(row);
            const styles = {
                'TRIGGERED': 'bg-emerald-500/20 text-emerald-400 border-emerald-500/40 animate-pulse',
                'IN ZONE': 'bg-teal-500/20 text-teal-300 border-teal-500/40',
                'PENDING': 'bg-amber-500/20 text-amber-400 border-amber-500/40',
                'PASSED': 'bg-purple-500/20 text-purple-400 border-purple-500/40',
                'TRACKING': 'bg-slate-800 text-slate-400 border-slate-700'
            };
            return `<span class="inline-flex items-center px-5 py-2 rounded-xl text-base font-black border ${styles[status]}">${status}</span>`;
        }

        async function loadData() {
            try {
                let response;
                const today = new Date().toISOString().slice(0,10);
                response = await fetch(baseUrl + today + ".csv");
               
                if (!response.ok) {
                    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
                    response = await fetch(baseUrl + yesterday + ".csv");
                }
               
                if (!response.ok) throw new Error("Could not find recent database.");
                
                const csvText = await response.text();
                const parsedResults = Papa.parse(csvText, { header: true, skipEmptyLines: true });
                
                currentData = parsedResults.data;
                globalHeaders = parsedResults.meta.fields;

                if (!globalHeaders.includes('Play_Status')) {
                    globalHeaders.splice(2, 0, 'Play_Status');
                }

                renderHeaders(globalHeaders);
                renderTable(currentData, globalHeaders);

                document.getElementById('searchInput').addEventListener('input', (e) => {
                    const term = e.target.value.toLowerCase();
                    const filtered = currentData.filter(item => 
                        Object.values(item).some(val => String(val).toLowerCase().includes(term))
                    );
                    renderTable(filtered, globalHeaders);
                });
            } catch (err) {
                console.error(err);
                document.getElementById('status').innerHTML = `⚠️ <span class="text-rose-400 font-extrabold">Data Offline</span>`;
            }
        }

        function renderHeaders(headers) {
            const container = document.getElementById('tableHeaders');
            container.innerHTML = headers.map(h => {
                if (hiddenColumns.includes(h)) return '';
                const width = columnWidths[h] || '180px';
                return `
                    <div class="p-6 cursor-pointer hover:bg-slate-800/80 transition-colors text-left flex items-center gap-2 whitespace-nowrap border-r border-slate-800 last:border-r-0"
                        style="width: ${width}; flex-shrink: 0;"
                        onclick="sortTable('${h}')">
                        <span>${formatHeaderLabel(h)}</span>
                        <span class="text-slate-500 text-xs">↕</span>
                    </div>
                `;
            }).join('');
        }

        function renderTable(data, headers) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');

            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            emptyState.classList.add('hidden');

            tbody.innerHTML = data.map(row => {
                let rowHtml = `<div class="flex hover:bg-slate-900/60 transition-colors">`;
                
                headers.forEach(h => {
                    if (hiddenColumns.includes(h)) return;
                    let val = row[h] || '';
                    const width = columnWidths[h] || '180px';
                    let cellClass = "table-cell p-6 flex items-center border-r border-slate-800 last:border-r-0";

                    if (h === 'Play_Status') {
                        cellClass += " justify-center";
                        val = calculatePlayStatus(row);
                    } else if (h === 'Ticker') {
                        val = `<span class="inline-flex items-center px-4 py-2 rounded-xl text-lg font-black bg-blue-500/10 text-blue-400 border border-blue-500/30">${val}</span>`;
                    } else if (h === 'Link') {
                        val = `<a href="${val}" target="_blank" class="inline-flex items-center gap-1.5 text-teal-400 hover:text-teal-300 bg-teal-500/10 hover:bg-teal-500/20 px-5 py-3 rounded-xl border border-teal-500/30 font-bold">View 🔗</a>`;
                    } else if (h === 'Current_Price') {
                        val = val ? `<span class="text-emerald-400 font-mono font-black text-2xl">$${parseFloat(val).toFixed(2)}</span>` : '-';
                    } else if (h === 'Scenario') {
                        cellClass += " scenario-cell";
                    } else if (['Entry', 'Stop_Loss', 'Targets'].includes(h)) {
                        cellClass += " font-mono text-base";
                    } else if (['Est_Probability', 'R_R_Ratio'].includes(h)) {
                        cellClass += " font-mono justify-center text-lg";
                    }

                    rowHtml += `<div class="${cellClass}" style="width: ${width}; flex-shrink: 0;">${val}</div>`;
                });

                rowHtml += `</div>`;
                return rowHtml;
            }).join('');
        }

        function sortTable(key) {
            sortDirection[key] = sortDirection[key] === 'asc' ? 'desc' : 'asc';
            const isAsc = sortDirection[key] === 'asc';

            currentData.sort((a, b) => {
                let valA, valB;
                if (key === 'Play_Status') {
                    valA = getPlayStatusValue(a);
                    valB = getPlayStatusValue(b);
                } else {
                    valA = a[key] || '';
                    valB = b[key] || '';
                }

                if (!isNaN(parseFloat(valA)) && !isNaN(parseFloat(valB))) {
                    return isAsc ? parseFloat(valA) - parseFloat(valB) : parseFloat(valB) - parseFloat(valA);
                }
                return isAsc ? String(valA).localeCompare(String(valB)) : String(valB).localeCompare(String(valA));
            });

            renderTable(currentData, globalHeaders);
        }

        loadData();
    </script>
</body>
</html>
